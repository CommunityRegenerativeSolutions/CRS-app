<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Community Regenerative Solutions | Employee Readiness</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Texas PAS Agency</p>
        <h1>Community Regenerative Solutions</h1>
        <p class="header-copy">Employee onboarding, clearance, orientation, and readiness tracking.</p>
      </div>
      <button class="secondary-action print-only-hidden" id="printButton" type="button">Print Record</button>
    </header>

    <main class="app-shell">
      <section class="dashboard" aria-labelledby="dashboardTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Dashboard</p>
            <h2 id="dashboardTitle">Employees</h2>
          </div>
          <button class="primary-action" id="newEmployeeButton" type="button">Add Employee</button>
        </div>

        <div class="employee-list" id="employeeList" aria-live="polite"></div>
      </section>

      <section class="workspace" aria-labelledby="workspaceTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Employee Record</p>
            <h2 id="workspaceTitle">Profile & Checklist</h2>
          </div>
          <span class="status-badge not-ready" id="statusBadge">NOT READY</span>
        </div>

        <form id="employeeForm">
          <section class="form-section">
            <h3>Employee Profile</h3>
            <div class="form-grid">
              <label>
                Full name
                <input id="fullName" name="fullName" autocomplete="name" required>
              </label>
              <label>
                Hire date
                <input id="hireDate" name="hireDate" type="date" required>
              </label>
              <label>
                Phone number
                <input id="phone" name="phone" autocomplete="tel">
              </label>
              <label>
                Email
                <input id="email" name="email" type="email" autocomplete="email">
              </label>
              <label class="wide-field">
                Address
                <textarea id="address" name="address" rows="2" autocomplete="street-address"></textarea>
              </label>
              <label>
                Emergency contact name
                <input id="emergencyContactName" name="emergencyContactName">
              </label>
              <label>
                Emergency contact phone
                <input id="emergencyContactPhone" name="emergencyContactPhone" autocomplete="tel">
              </label>
              <label>
                Job title
                <input id="jobTitle" name="jobTitle" placeholder="Attendant, Supervisor, etc.">
              </label>
            </div>
          </section>

          <section class="form-section">
            <div class="progress-row">
              <h3>First Employee Checklist</h3>
              <strong id="percentComplete">0% complete</strong>
            </div>
            <div class="checklist" id="checklistContainer"></div>
          </section>

          <section class="form-section">
            <label>
              General employee notes
              <textarea id="generalNotes" name="generalNotes" rows="5" placeholder="Add reminders, follow-up details, or supervisor notes."></textarea>
            </label>
          </section>

          <div class="button-row print-only-hidden">
            <button class="primary-action" type="submit">Save Employee</button>
            <button class="secondary-action" id="deleteEmployeeButton" type="button">Delete Employee</button>
          </div>
        </form>
      </section>
    </main>

    <script src="src/checklist-data.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
